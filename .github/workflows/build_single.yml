name: Build single-file machinestate.py

on:
  push:
    branches: [ modularize ]
  workflow_dispatch:

concurrency:
  group: build-single-${{ github.ref }}
  cancel-in-progress: true

permission:
  contents: write

jobs:
  build-single:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python -V

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Build single-file script
        run: |
          echo "[info] Running build_single.py..."
          python build_single.py
          echo "[info] Build complete."
          test -f machinestate.py && ls -lh machinestate.py

      - name: Commit and push updated machinestate.py
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update machinestate.py"
          file_pattern: machinestate.py